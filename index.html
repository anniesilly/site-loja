<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de CDs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>Studio</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#destaques">Destaques</a></li>
                <li><a href="#catalogo">Loja</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Explore</h3>
            <p>Encontre CDs!</p>
            <a href="#catalogo" class="btn-shop">Compre Agora</a>
        </div>
    </section>

    <section class="produtos">
        <h2 id="destaques">Destaques</h2>
        <div class="produto-grid">

            <div class="produto">
                <img src="imagens/" alt="album">
                <h3>X</h3>
                <a href="#" class="btn">eu quero!</a>
            </div>

            <div class="produto">
                <img src="imagens/sonic.jpg" alt="album">
                <h3>Y</h3>
                <a href="#" class="btn">eu quero!</a>
            </div>

        </div>
    </section>
        
    <section class="catalogo">
        <h2 id="catalogo">Catálogo</h2>
        <div class="catalogo-grid">

            <div class="cd">
                <img src="imagens/sonic.jpg" alt="album">
                <h3>a</h3>
                <a href="#" class="btn-cd">Comprar</a>
            </div>

            <div class="cd">
                <img src="cd2.jpg" alt="album">
                <h3>b</h3>
                <a href="#" class="btn-cd">Comprar</a>
            </div>

            <div class="cd">
                <img src="imagens/sonic.jpg" alt="album">
                <h3>c</h3>
                <a href="#" class="btn-cd">Comprar</a>
            </div>

            <div class="cd">
                <img src="cd2.jpg" alt="album">
                <h3>d</h3>
                <a href="#" class="btn-cd">Comprar</a>
            </div>

        </div>
    </section>

    <section>
        <h2 id="contato">Contato</h2>

    </section>

    <footer>
        <p>&copy; 2026 Studio - Todos os direitos reservados.</p>
    </footer>
</body>
</html>
